    <div class="centering-purpose">

      <main>
        <section class="menu-details centering" id="menu-details">

            <div class="left-side">

            <div class="right-side">
              <div class="food-details">
                <h1>Pizza</h1>

                <p>$14</p>
              </div>
              <i class="fa-solid fa-circle-plus"></i>

        </section>

        <section class="ordered-sec centering hidden">
          <h1>Your order</h1>
          <div class="ordered">

          <div class="ordered total-ordered">

        <section class="card-details">
          <form action="#">
            <p>Enter card details</p>
            <input
              type="text"
              placeholder="Enter your name"
              class="input-things"
            /><br />
            <input
              type="text"
              placeholder="Enter card number"
              class="input-things"
            /><br />
            <input
              type="text"
              placeholder="Enter CVV"
              class="input-things"
            /><br />
            <button class="pay-btn">Pay</button>
          </form>
        </section>
      </main>
