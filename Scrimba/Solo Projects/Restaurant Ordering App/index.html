<html>
  <head>
    <link rel="stylesheet" href="index.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Creepster&family=Iosevka+Charon+Mono:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&family=Orbitron:wght@400..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="centering-purpose">
      <nav>
        <img src="./image/nav_banner.png" alt="" />
      </nav>
      <main>
        <section class="menu-details centering" id="menu-details"></section>

        <section class="ordered-sec centering" id="ordering-section"></section>

        <section class="card-details">
          <form action="#">
            <p>Enter card details</p>
            <input
              id="card-name"
              required
              type="text"
              placeholder="Enter your name"
              class="input-things"
            /><br />
            <input
              id="card-number"
              required
              type="number"
              placeholder="Enter card number"
              class="input-things"
            /><br />
            <input
              id="card-cvv"
              required
              type="number"
              placeholder="Enter CVV"
              class="input-things"
              maxlength="3"
              pattern="\d{3}"
            /><br />
            <button class="pay-btn" id="pay-btn">Pay</button>
          </form>
        </section>
      </main>
    </div>
    <script src="index.js" type="module"></script>
  </body>
</html>
