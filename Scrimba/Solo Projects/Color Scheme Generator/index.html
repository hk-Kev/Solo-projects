<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Color Scheme Generator</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="main-thingy">
      <nav>
        <input type="color" id="color-picker" />
        <select name="Color Scheme Mode" id="scheme-mode">
          <option value="monochrome">Monochrome</option>
          <option value="monochrome-dark">Monochrome-Dark</option>
          <option value="monochrome-light">Monochrome-Light</option>
          <option value="analogic">Analogic</option>
          <option value="complement">Complement</option>
          <option value="analogic-complement">Analogic-complement</option>
          <option value="triad">Triad</option>
          <option value="quad">Quad</option>
        </select>
        <button id="fetch-color-scheme">Get Color Scheme</button>
      </nav>
      <main id="main">
        <div class="background-colors">
          <div id="color-1"></div>
          <p id="hex-color-1">#264653</p>
        </div>
        <div class="background-colors">
          <div id="color-2"></div>
          <p id="hex-color-2">#2A9D8F</p>
        </div>
        <div class="background-colors">
          <div id="color-3"></div>
          <p id="hex-color-3">#E9C46A</p>
        </div>
        <div class="background-colors">
          <div id="color-4"></div>
          <p id="hex-color-4">#F4A261</p>
        </div>
        <div class="background-colors">
          <div id="color-5"></div>
          <p id="hex-color-5">#E76F51</p>
        </div>
      </main>
    </div>
    <script src="script.js"></script>
  </body>
</html>
